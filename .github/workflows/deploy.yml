name: Build & Deploy to EKS

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'k8s/**'
      - '.github/workflows/**'

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: k8s-node-app
  EKS_CLUSTER: my-eks-cluster

jobs:
  # ─── Job 1: Test ────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package.json

      - name: Install & test
        run: cd app && npm install && npm test --if-present

  # ─── Job 2: Build & Push image ──────────────────────────────────────────────
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.build.outputs.image }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set version from git SHA
        id: version
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$VERSION
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64 \
            --tag $IMAGE \
            --push \
            app/
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "✅ Pushed: $IMAGE"

  # ─── Job 3: Deploy to Staging (automatic) ───────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging            # no approval needed

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy to staging namespace
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          kubectl set image deployment/node-app \
            node-app=$IMAGE \
            --namespace staging

          kubectl set env deployment/node-app \
            APP_VERSION=$VERSION \
            --namespace staging

          kubectl rollout status deployment/node-app \
            --namespace staging \
            --timeout=120s

      - name: Smoke test staging
        run: |
          echo "⏳ Waiting for pod to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app=node-app \
            -n staging \
            --timeout=60s

          # Port-forward and test
          kubectl port-forward svc/node-app-service 8080:80 -n staging &
          sleep 5
          RESPONSE=$(curl -sf http://localhost:8080/health)
          echo "✅ Staging health: $RESPONSE"

          # Confirm correct environment
          APP_ENV=$(curl -s http://localhost:8080/ | python3 -c "import sys,json; print(json.load(sys.stdin)['appEnv'])")
          echo "🌍 APP_ENV: $APP_ENV"
          [ "$APP_ENV" = "staging" ] && echo "✅ Correct environment!" || (echo "❌ Wrong env!" && exit 1)

  # ─── Job 4: Deploy to Production (manual approval) ──────────────────────────
  deploy-prod:
    name: 🏁 Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]  # waits for staging to pass
    environment: production         # ← REQUIRES MANUAL APPROVAL in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy to production namespace
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          kubectl set image deployment/node-app \
            node-app=$IMAGE \
            --namespace default

          kubectl set env deployment/node-app \
            APP_VERSION=$VERSION \
            --namespace default

          kubectl rollout status deployment/node-app \
            --namespace default \
            --timeout=120s

      - name: Verify production
        run: |
          sleep 5
          RESPONSE=$(curl -sf https://api.fawasam.in/)
          echo "✅ Production response: $RESPONSE"
          VERSION=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "🚀 Live version: $VERSION"

      - name: Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ needs.build.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ needs.build.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://api.fawasam.in |" >> $GITHUB_STEP_SUMMARY

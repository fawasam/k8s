name: Build & Deploy to EKS

on:
  push:
    branches:
      - main                        # trigger on every push to main
    paths:
      - 'app/**'                    # only when app code changes
      - 'k8s/**'                    # or k8s manifests change
      - '.github/workflows/**'

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: k8s-node-app
  EKS_CLUSTER: my-eks-cluster
  DEPLOYMENT_NAME: node-app
  CONTAINER_NAME: node-app

jobs:
  # ─── Job 1: Run tests ──────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package.json

      - name: Install dependencies
        run: cd app && npm install

      - name: Run tests
        run: cd app && npm test --if-present

  # ─── Job 2: Build & Push Docker image ─────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test                     # only runs if test passes
    outputs:
      image: ${{ steps.build.outputs.image }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version tag
        id: version
        run: |
          # version = git short SHA (e.g. abc1234)
          VERSION=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$VERSION

          docker buildx create --use
          docker buildx build \
            --platform linux/amd64 \
            --tag $IMAGE \
            --push \
            app/

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Built and pushed: $IMAGE"

  # ─── Job 3: Deploy to EKS ─────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build                    # only runs if build passes
    environment: production         # requires manual approval in GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy new image
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          # Update the image in the deployment
          kubectl set image deployment/$DEPLOYMENT_NAME \
            $CONTAINER_NAME=$IMAGE \
            --namespace default

          # Update APP_VERSION env var
          kubectl set env deployment/$DEPLOYMENT_NAME \
            APP_VERSION=$VERSION \
            --namespace default

          # Wait for rollout to complete
          kubectl rollout status deployment/$DEPLOYMENT_NAME \
            --namespace default \
            --timeout=120s

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -l app=node-app --namespace default

          echo "=== Testing live URL ==="
          sleep 5
          curl -sf https://api.fawasam.in/health

      - name: Notify on success
        run: |
          echo "✅ Deployed ${{ needs.build.outputs.version }} to https://api.fawasam.in"

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: node-app-secret
  namespace: default
spec:
  refreshInterval: 1h              # re-sync from SSM every 1 hour

  secretStoreRef:
    name: aws-ssm-store            # use the ClusterSecretStore above
    kind: ClusterSecretStore

  target:
    name: node-app-secret          # creates this K8s Secret automatically
    creationPolicy: Owner          # ESO owns and manages this secret

  data:
    - secretKey: DB_USER           # key inside the K8s Secret
      remoteRef:
        key: /node-app/prod/DB_USER        # SSM parameter path

    - secretKey: DB_PASSWORD
      remoteRef:
        key: /node-app/prod/DB_PASSWORD

    - secretKey: API_KEY
      remoteRef:
        key: /node-app/prod/API_KEY

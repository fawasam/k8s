apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: staging-team-role
  namespace: staging
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create"]

  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "update", "patch"]

  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: staging-team-binding
  namespace: staging
subjects:
  - kind: Group
    name: staging-team
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: staging-team-role
  apiGroup: rbac.authorization.k8s.io

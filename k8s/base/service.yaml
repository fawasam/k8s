apiVersion: v1
kind: Service
metadata:
  name: node-app-service
  namespace: default
spec:
  # ClusterIP = internal only, Ingress handles external traffic
  type: ClusterIP
  selector:
    app: node-app             # Routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 80                # External port
      targetPort: 3000        # Container port

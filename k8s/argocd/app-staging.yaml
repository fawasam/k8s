apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-app-staging
  namespace: argocd
  # Finalizer ensures ArgoCD cleans up K8s resources if this Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # WHERE to get the code from
  source:
    repoURL: https://github.com/fawasam/k8s.git
    targetRevision: main           # watch the main branch
    path: helm/node-app            # path to our Helm chart
    helm:
      valueFiles:
        - values.yaml              # base values
        - values.staging.yaml      # staging overrides

  # WHERE to deploy it
  destination:
    server: https://kubernetes.default.svc   # this cluster
    namespace: staging

  # HOW to sync
  syncPolicy:
    automated:
      prune: true      # delete K8s resources removed from git
      selfHeal: true   # fix manual changes (drift correction)
    syncOptions:
      - CreateNamespace=true

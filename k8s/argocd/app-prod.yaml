apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/fawasam/k8s.git
    targetRevision: main
    path: helm/node-app
    helm:
      valueFiles:
        - values.yaml             # prod is the default values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  # PROD: manual sync only — no auto-deploy, human must click Sync in UI
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    # NO automated: block means manual sync required
